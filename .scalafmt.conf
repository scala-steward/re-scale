version = "3.8.3"
runner.dialect = scala3
maxColumn = 120
align.preset = some
align.openParenCallSite = false
align.openParenDefnSite = false
indent.main = 2
indent.defnSite = 2
indent.ctorSite = 2
rewrite.rules = [RedundantBraces, RedundantParens, SortModifiers]
docstrings.style = Asterisk
docstrings.wrap = no
newlines.source = keep
project.includePaths = ["glob:**.scala", "glob:**.sbt"]
project.excludePaths = ["glob:**/target/**", "glob:**/.bloop/**"]
